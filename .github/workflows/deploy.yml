name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO: ai-repo
  IMAGE: ai-app
  SERVICE: ai-app

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -c "from main import app; print('App import OK')"
        env:
          GOOGLE_CLOUD_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
          GOOGLE_CLOUD_REGION: us-central1
          CHROMA_DB_DIR: /tmp/chroma

  deploy:
    name: Build and Deploy
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image locally
        run: |
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} .

      - name: Push image to Artifact Registry
        run: |
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=2 \
            --concurrency=1 \
            --set-env-vars GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }},GOOGLE_CLOUD_REGION=${{ env.REGION }},CHROMA_DB_DIR=/tmp/chroma,GITHUB_PAT=${{ secrets.GIT_HUB_PAT }} \
            --project ${{ env.PROJECT_ID }}

      - name: Print deployed URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format='value(status.url)')
          echo "✅ Deployed: $URL"

  deploy-mcp-server:
    name: Build and Deploy MCP Server
    needs: deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Build MCP server image
        run: |
          gcloud builds submit --config=cloudbuild.mcp.yaml . --project ${{ env.PROJECT_ID }}

      - name: Deploy MCP server to Cloud Run
        run: |
          gcloud run deploy recruitment-mcp-server \
            --image gcr.io/${{ env.PROJECT_ID }}/recruitment-mcp-server \
            --region ${{ env.REGION }} \
            --allow-unauthenticated \
            --set-env-vars GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }} \
            --project ${{ env.PROJECT_ID }}

      - name: Get MCP server URL
        id: mcp_url
        run: |
          URL=$(gcloud run services describe recruitment-mcp-server \
            --region ${{ env.REGION }} --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

    outputs:
      mcp_url: ${{ steps.mcp_url.outputs.url }}

  smoke-test-mcp:
    name: Smoke Test MCP Server
    needs: deploy-mcp-server
    runs-on: ubuntu-latest
    steps:
      - name: List MCP tools
        run: |
          npx @modelcontextprotocol/inspector --cli \
            ${{ needs.deploy-mcp-server.outputs.mcp_url }}/mcp \
            --method tools/list